<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexFlow - منصة إدارة المنتجات</title>
    <style>
        body {
            font-family: 'Tajawal', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .note {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🛍️ ApexFlow</div>
        <h2>مرحباً بك في منصة إدارة المتجر</h2>
        <p>يمكنك من هنا الدخول إلى لوحة التحكم لإضافة المنتجات ومتابعة الطلبات.</p>
        <a href="admin.html" class="btn"><i class="fas fa-crown"></i> الدخول إلى لوحة التحكم</a>
        <div class="note">⚠️ ملاحظة: هذا المتجر يعمل محلياً على متصفحك. البيانات (المنتجات والطلبات) مخزنة في جهازك.</div>
    </div>
    <!-- رابط أيقونات فونت Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
