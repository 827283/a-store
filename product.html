<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منتج ApexFlow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .product-container { max-width: 1100px; margin: 30px auto; padding: 20px; }
        .product-card { background: var(--card-bg); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; box-shadow: var(--shadow-md); }
        .gallery { flex: 1.2; min-width: 280px; padding: 20px; }
        .main-image { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius-md); }
        .thumbnails { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: var(--radius-sm); cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .thumb.active { border-color: var(--primary); }
        .info { flex: 1; padding: 30px; }
        .price { font-size: 2rem; color: var(--primary); font-weight: bold; margin: 15px 0; }
        .order-form { background: var(--card-bg); border-radius: var(--radius-lg); padding: 30px; margin-top: 20px; box-shadow: var(--shadow-md); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; max-width: 500px; width: 90%; border-radius: var(--radius-lg); padding: 25px; }
        .toast { position: fixed; bottom: 20px; left: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 50px; transform: translateY(100px); transition: 0.3s; z-index: 1100; }
        .toast.show { transform: translateY(0); }
        .btn-block { width: 100%; }
    </style>
</head>
<body>
    <div class="product-container" id="productContainer">
        <!-- سيتم تعبئة البيانات عبر JS -->
    </div>

    <div id="toast" class="toast">✅ تم إرسال طلبك</div>

    <script>
        // الحصول على معرف المنتج من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            document.getElementById('productContainer').innerHTML = '<div class="card text-center"><h2>منتج غير موجود</h2><p>يرجى التحقق من الرابط</p></div>';
        } else {
            // تحميل المنتجات من localStorage
            const products = JSON.parse(localStorage.getItem('apexflow_products') || '[]');
            const product = products.find(p => p.id === productId);
            if (!product) {
                document.getElementById('productContainer').innerHTML = '<div class="card text-center"><h2>المنتج غير موجود</h2><p>ربما تم حذفه</p></div>';
            } else {
                renderProductPage(product);
            }
        }

        function renderProductPage(product) {
            const container = document.getElementById('productContainer');
            // إنشاء معرض الصور
            let galleryHtml = `
                <div class="product-card">
                    <div class="gallery">
                        <img id="mainImage" class="main-image" src="${product.images[0] || ''}" alt="${product.title}">
                        <div class="thumbnails" id="thumbnails">`;
            product.images.forEach((src, idx) => {
                galleryHtml += `<img src="${src}" class="thumb ${idx === 0 ? 'active' : ''}" data-src="${src}">`;
            });
            galleryHtml += `</div></div>
                    <div class="info">
                        <h1>${product.title}</h1>
                        <p>${product.description}</p>
                        <div class="price">${product.price} درهم</div>
                        <button id="orderNowBtn" class="btn btn-primary"><i class="fas fa-shopping-cart"></i> طلب الآن</button>
                    </div>
                </div>
                <div id="orderModal" class="modal">
                    <div class="modal-content">
                        <span id="closeModal" style="float: left; font-size: 1.8rem; cursor: pointer;">&times;</span>
                        <h3><i class="fas fa-clipboard-list"></i> أكمل طلبك</h3>
                        <form id="orderForm">
                            <div class="form-group"><label>الاسم الكامل *</label><input type="text" id="fullName" required></div>
                            <div class="form-group"><label>العنوان *</label><input type="text" id="address" required></div>
                            <div class="form-group"><label>رقم الهاتف *</label><input type="tel" id="phone" required></div>
                            <div class="form-group"><label>ملاحظة (مقاس، لون)</label><textarea id="notes" rows="2"></textarea></div>
                            <button type="submit" class="btn btn-primary btn-block">تأكيد الطلب</button>
                        </form>
                    </div>
                </div>
            `;
            container.innerHTML = galleryHtml;

            // معرض الصور
            const mainImg = document.getElementById('mainImage');
            const thumbs = document.querySelectorAll('.thumb');
            thumbs.forEach(thumb => {
                thumb.addEventListener('click', () => {
                    mainImg.src = thumb.getAttribute('data-src');
                    thumbs.forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                });
            });

            // المودال
            const modal = document.getElementById('orderModal');
            const orderBtn = document.getElementById('orderNowBtn');
            const closeModal = document.getElementById('closeModal');
            orderBtn.onclick = () => modal.style.display = 'flex';
            closeModal.onclick = () => modal.style.display = 'none';
            window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };

            // إرسال الطلب
            const toast = document.getElementById('toast');
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }

            document.getElementById('orderForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const fullName = document.getElementById('fullName').value.trim();
                const address = document.getElementById('address').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const notes = document.getElementById('notes').value.trim();
                if(!fullName || !address || !phone) {
                    alert('الرجاء تعبئة جميع الحقول المطلوبة');
                    return;
                }
                const order = {
                    productId: product.id,
                    productTitle: product.title,
                    productPrice: product.price,
                    productImage: product.images[0] || '',
                    fullName,
                    address,
                    phone,
                    notes,
                    timestamp: new Date().toLocaleString('ar-MA')
                };
                let orders = JSON.parse(localStorage.getItem('apexflow_orders') || '[]');
                orders.unshift(order);
                localStorage.setItem('apexflow_orders', JSON.stringify(orders));
                showToast('🎉 تم استلام طلبك! سنتصل بك قريباً');
                document.getElementById('orderForm').reset();
                modal.style.display = 'none';
            });
        }
    </script>
</body>
</html>
